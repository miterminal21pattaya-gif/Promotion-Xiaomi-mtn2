<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROMOTION XIAOMI MTN 2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;color:#fff;min-height:100vh}
header{background:linear-gradient(135deg,#ff6700,#ff8c00);padding:25px;font-size:30px;font-weight:700;text-align:center;box-shadow:0 10px 30px rgba(255,103,0,.4);position:sticky;top:0;z-index:999;width:100%}
.topmenu{display:flex;gap:12px;padding:20px;overflow-x:auto;background:#111827;flex-wrap:nowrap}.topmenu button{min-width:140px;white-space:normal}
.topmenu button,.bankmenu button{background:#1f2937;color:#fff;border:none;padding:14px 20px;border-radius:16px;cursor:pointer}
.topmenu button:hover{background:#ff6700}
.content{padding:20px}
.box,#giftManager{background:rgba(255,255,255,.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;margin-bottom:20px}
#searchInput{width:100%;padding:16px;border-radius:15px;border:none;background:#1f2937;color:#fff}
.bankmenu{display:none;gap:10px;padding:10px;margin-bottom:15px;overflow:auto}
.bankmenu button.active{background:#ff6700}
table{width:100%;border-collapse:collapse;background:#111827;border-radius:20px;overflow:hidden;font-size:14px}
th{background:#ff6700;color:#fff;padding:16px}
td{padding:14px;border-bottom:1px solid rgba(255,255,255,.08)}
tr:hover{background:#1f2937}
.scb{background:rgba(128,0,255,.08)} .ktc{background:rgba(255,0,0,.08)}
.kbank{background:rgba(0,255,0,.08)} .krungsri{background:rgba(255,204,0,.08)}
.other{background:rgba(255,255,255,.03)}
#giftCards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.gift-card{background:#111827;border-radius:20px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.4)}
.gift-card img{width:100%;height:220px;object-fit:cover}
.gift-card .title{padding:15px;font-size:18px;font-weight:bold}

.mobileTableWrap{overflow:auto;border-radius:20px}
@media(max-width:768px){
header{font-size:24px}
.content{padding:10px}
th,td{padding:10px;min-width:120px}
}
</style>

</head>
<body>

<header>PROMOTION XIAOMI MTN 2</header>

<div class="topmenu">
<button onclick="setCat('promo')">โปรโมชั่นสินค้า</button>
<button onclick="setCat('installment')">โค้ดผ่อนสินค้า</button>
<button onclick="setCat('gift')">ของแถมสินค้า</button>
<button onclick="setCat('phonepromo')">โปรโมชั่นโทรศัพท์</button>
<button onclick="setCat('trade')">โปร Trade Smart Phone</button>
<button onclick="setCat('links')">ลิงก์งาน</button>
</div>

<div class="content">
<div class="box">
<h3 id="title"></h3>
<input type="file" id="excel" accept=".xlsx,.xls" onchange="importExcel(event)">
<input id="searchInput" placeholder="🔍 ค้นหาข้อมูล..." onkeyup="filterTable()" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd">
</div>

<div id="bankMenu" class="bankmenu"></div>
<div id="giftManager" style="display:none;background:#fff;padding:15px;border-radius:12px;margin-bottom:10px">
<h3>เพิ่มของแถมพร้อมรูปภาพ</h3>
<input id="giftName" placeholder="ชื่อของแถม" style="width:100%;padding:10px;margin-bottom:8px">
<input type="file" id="giftImage" accept="image/*" style="margin-bottom:8px">
<button onclick="saveGift()">บันทึกของแถม</button>
<div id="giftCards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:15px"></div>
</div>


<div class="mobileTableWrap"><table id="excelTable">
<thead><tr id="theadRow"></tr></thead>
<tbody></tbody>
</table></div>
</div>

<script>
let current='promo';
let currentSheet='';

const names={
promo:'โปรโมชั่นสินค้า',
installment:'โค้ดผ่อนสินค้า',
gift:'ของแถมสินค้า',
phonepromo:'โปรโมชั่นโทรศัพท์',
trade:'โปร Trade Smart Phone',
links:'ลิงก์งาน'
};

function getKey(c){ return 'excel_'+c; }

function setCat(cat){
 current=cat;
 document.getElementById('title').innerText=names[cat];
 loadData();
}

function importExcel(e){
 const file=e.target.files[0];
 if(!file) return;

 const reader=new FileReader();
 reader.onload=function(evt){
   const wb=XLSX.read(new Uint8Array(evt.target.result),{type:'array'});

   const data={};
   wb.SheetNames.forEach(name=>{
      data[name]=XLSX.utils.sheet_to_json(
        wb.Sheets[name],
        {header:1,defval:''}
      );
   });

   localStorage.setItem(getKey(current),JSON.stringify(data));
   loadData();
 };
 reader.readAsArrayBuffer(file);
}

function loadData(){
 const raw=localStorage.getItem(getKey(current));

 document.getElementById('bankMenu').style.display='none';

 if(!raw){
   renderRows([]);
   return;
 }

 const sheets=JSON.parse(raw);
 const namesArr=Object.keys(sheets);

 if(current==='installment' && namesArr.length>1){
    createBankTabs(namesArr,sheets);
 }else{
    renderRows(sheets[namesArr[0]]||[]);
 }
}

function createBankTabs(sheetNames,sheets){
 const menu=document.getElementById('bankMenu');
 menu.style.display='flex';

 menu.innerHTML='';

 sheetNames.forEach((s,i)=>{
   const btn=document.createElement('button');
   btn.textContent=s;

   btn.onclick=()=>{
      [...menu.querySelectorAll('button')].forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentSheet=s;
      renderRows(sheets[s],s);
   };

   menu.appendChild(btn);

   if(i===0){
      btn.click();
   }
 });
}

function getBankClass(name=''){
 const n=name.toLowerCase();

 if(n.includes('scb')) return 'scb';
 if(n.includes('ktc')) return 'ktc';
 if(n.includes('kbank')) return 'kbank';
 if(n.includes('krungsri')) return 'krungsri';
 return 'other';
}

function renderRows(rows,sheetName=''){
 const tbody=document.querySelector('#excelTable tbody');
 const thead=document.querySelector('#theadRow');

 tbody.innerHTML='';
 thead.innerHTML='';

 if(!rows || rows.length===0){
   tbody.innerHTML='<tr><td>ไม่มีข้อมูล</td></tr>';
   return;
 }

 let maxCols=0;
 rows.forEach(r=>{
   if(r && r.length>maxCols) maxCols=r.length;
 });

 for(let c=0;c<maxCols;c++){
   thead.innerHTML += '<th>คอลัมน์ '+(c+1)+'</th>';
 }

 const rowClass=getBankClass(sheetName);

 rows.forEach(r=>{
   if(!r || r.every(x=>String(x).trim()==='')) return;

   let tr='<tr class="'+rowClass+'">';
   for(let c=0;c<maxCols;c++){
      tr+='<td>'+(r[c]??'')+'</td>';
   }
   tr+='</tr>';
   tbody.innerHTML+=tr;
 });
}


function loadGifts(){
 const box=document.getElementById('giftCards');
 if(!box) return;
 const gifts=JSON.parse(localStorage.getItem('gift_items')||'[]');
 box.innerHTML='';
 gifts.forEach((g,i)=>{
   box.innerHTML+=`
   <div class="gift-card">
      <img src="${g.img}">
      <div class="title">${g.name}</div>
      <button onclick="deleteGift(${i})">ลบ</button>
   </div>`;
 });
}

function saveGift(){
 const name=document.getElementById('giftName').value;
 const file=document.getElementById('giftImage').files[0];
 if(!name||!file) return alert('กรอกข้อมูลให้ครบ');

 const r=new FileReader();
 r.onload=function(e){
   const gifts=JSON.parse(localStorage.getItem('gift_items')||'[]');
   gifts.push({name:name,img:e.target.result});
   localStorage.setItem('gift_items',JSON.stringify(gifts));
   loadGifts();
 };
 r.readAsDataURL(file);
}

function deleteGift(i){
 const gifts=JSON.parse(localStorage.getItem('gift_items')||'[]');
 gifts.splice(i,1);
 localStorage.setItem('gift_items',JSON.stringify(gifts));
 loadGifts();
}

const oldSetCat=setCat;
setCat=function(cat){
 oldSetCat(cat);
 const gm=document.getElementById('giftManager');
 gm.style.display=(cat==='gift')?'block':'none';
 if(cat==='gift') loadGifts();
}

function filterTable(){
 const q=document.getElementById('searchInput')?.value.toLowerCase() || '';
 document.querySelectorAll('#excelTable tbody tr').forEach(tr=>{
   tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
 });
}
setCat('promo');


</script>
</body>
